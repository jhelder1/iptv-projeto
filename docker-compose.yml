services:
  postgres:
    image: postgres:16-alpine
    container_name: clientezero-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: clientezero
      POSTGRES_USER: clientezero
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./sql/supabase/001_init_schema.sql:/docker-entrypoint-initdb.d/001_init_schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U clientezero"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - apps

  clientezero-web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: clientezero-web
    restart: unless-stopped
    env_file:
      - .env
    expose:
      - "3000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - apps

  n8n:
    image: n8nio/n8n:latest
    container_name: n8n
    restart: unless-stopped
    env_file:
      - .env.n8n
    volumes:
      - n8n_data:/home/node/.n8n
    expose:
      - "5678"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - apps

  evolution-api:
    image: atendai/evolution-api:latest
    container_name: evolution-api
    restart: unless-stopped
    environment:
      SERVER_URL: https://evolution.${DOMAIN}
      DEL_INSTANCE: "false"
      DATABASE_ENABLED: "true"
      DATABASE_PROVIDER: postgresql
      DATABASE_CONNECTION_URI: postgres://clientezero:${POSTGRES_PASSWORD}@postgres:5432/clientezero
      DATABASE_CONNECTION_CLIENT_NAME: evolution_api
      DATABASE_SAVE_DATA_INSTANCE: "true"
      DATABASE_SAVE_DATA_NEW_MESSAGE: "true"
      DATABASE_SAVE_MESSAGE_UPDATE: "true"
      DATABASE_SAVE_DATA_CONTACTS: "true"
      DATABASE_SAVE_DATA_CHATS: "true"
      AUTHENTICATION_TYPE: apikey
      AUTHENTICATION_API_KEY: ${EVOLUTION_API_KEY}
      AUTHENTICATION_EXPOSE_IN_FETCH_INSTANCES: "true"
      LANGUAGE: pt-BR
      LOG_LEVEL: ERROR
      CONFIG_SESSION_PHONE_CLIENT: ClienteZero
      CONFIG_SESSION_PHONE_NAME: Chrome
    volumes:
      - evolution_data:/evolution/instances
    expose:
      - "8080"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - apps

  caddy:
    image: caddy:2.10
    container_name: clientezero-proxy
    restart: unless-stopped
    depends_on:
      - clientezero-web
      - evolution-api
    env_file:
      - .env
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - apps

networks:
  apps:
    driver: bridge

volumes:
  pgdata:
  n8n_data:
  evolution_data:
  caddy_data:
  caddy_config:
